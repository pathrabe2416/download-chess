<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess Master — Icon Generator</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 30px; }
    h2 { color: #d4af76; margin-bottom: 20px; }
    .icons { display: flex; flex-wrap: wrap; gap: 20px; margin: 30px 0; }
    .icon-wrap { text-align: center; }
    canvas { display: block; border: 1px solid #333; }
    p { color: #888; font-size: 13px; margin-top: 6px; }
    button {
      background: #d4af76; color: #111; border: none;
      padding: 12px 28px; font-size: 14px; cursor: pointer;
      font-family: monospace; letter-spacing: 1px; margin-top: 20px;
    }
    button:hover { opacity: 0.85; }
    .note { color: #d4af76; font-size: 14px; line-height: 1.8; }
  </style>
</head>
<body>
  <h2>Chess Master — PWA Icon Generator</h2>
  <p class="note">
    Open this file in your browser.<br>
    Click "Download All Icons" — save each file into an <code>icons/</code> folder next to your HTML files.
  </p>

  <div class="icons" id="iconContainer"></div>
  <button onclick="downloadAll()">⬇ Download All Icons</button>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = size;

      /* Background */
      ctx.fillStyle = '#070707';
      ctx.beginPath();
      ctx.roundRect(0, 0, s, s, s * 0.18);
      ctx.fill();

      /* Gold border */
      ctx.strokeStyle = '#d4af76';
      ctx.lineWidth = s * 0.04;
      ctx.beginPath();
      ctx.roundRect(s * 0.05, s * 0.05, s * 0.9, s * 0.9, s * 0.14);
      ctx.stroke();

      /* Chess king symbol */
      ctx.fillStyle = '#e8e0d5';
      ctx.font = `${s * 0.52}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('♔', s / 2, s * 0.49);

      /* Gold underline accent */
      ctx.fillStyle = '#d4af76';
      ctx.fillRect(s * 0.3, s * 0.76, s * 0.4, s * 0.025);

      return canvas;
    }

    function buildPreviews() {
      const container = document.getElementById('iconContainer');
      SIZES.forEach(size => {
        const canvas = drawIcon(size);
        const scale = Math.min(1, 128 / size);
        const preview = document.createElement('canvas');
        preview.width = preview.height = Math.round(size * scale);
        preview.getContext('2d').drawImage(canvas, 0, 0, preview.width, preview.height);

        const wrap = document.createElement('div');
        wrap.className = 'icon-wrap';
        const label = document.createElement('p');
        label.textContent = `${size}×${size}`;
        wrap.appendChild(preview);
        wrap.appendChild(label);
        container.appendChild(wrap);
      });
    }

    function downloadAll() {
      SIZES.forEach((size, i) => {
        setTimeout(() => {
          const canvas = drawIcon(size);
          const a = document.createElement('a');
          a.download = `icon-${size}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        }, i * 200);
      });
    }

    buildPreviews();
  </script>
</body>
</html>
