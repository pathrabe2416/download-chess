<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Master — Offline</title>
  <style>
    :root {
      --bg: #070707;
      --gold: #d4af76;
      --text: #e8e0d5;
      --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Georgia', serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 400px;
    }
    .icon {
      font-size: 80px;
      display: block;
      margin-bottom: 32px;
      opacity: 0.7;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50%      { transform: scale(1.04); opacity: 1; }
    }
    h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 3px;
      color: var(--text);
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    button {
      padding: 14px 36px;
      background: var(--gold);
      border: none;
      color: #070707;
      font-family: 'Georgia', serif;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    button:hover { opacity: 0.85; transform: translateY(-2px); }

    /* corner accents */
    body::before { content:''; position:fixed; top:20px; left:20px; width:50px; height:50px; border:2px solid var(--gold); border-right:none; border-bottom:none; }
    body::after  { content:''; position:fixed; bottom:20px; right:20px; width:50px; height:50px; border:2px solid var(--gold); border-left:none; border-top:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="icon">♔</span>
    <h1>You're Offline</h1>
    <p>
      No internet connection detected. If you've visited before, your game should load automatically.
      Try refreshing — or connect to the internet to continue.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
